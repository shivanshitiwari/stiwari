<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shivanshi Tiwari's Portfolio</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css" rel="stylesheet">
  <style>
    /* General Reset */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #f0f0f0;
      color: #333;
      overflow-x: hidden;
    }

    /* Navigation Bar */
    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 50px;
      background-color: #fff;
      box-shadow: 0px 4px 8px rgba(0, 0, 0, 0.1);
      position: fixed;
      width: 100%;
      top: 0;
      z-index: 100;
    }

    nav .logo {
      font-size: 24px;
      font-weight: bold;
    }

    nav ul {
      display: flex;
      list-style: none;
    }

    nav ul li {
      margin: 0 15px;
    }

    nav ul li a {
      text-decoration: none;
      color: #333;
      font-size: 18px;
    }

    nav ul li a:hover {
      color: #FF9900;
    }

    /* Container */
    .container {
      margin-top: 100px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      background-color: #f5f5f5;
      background-image: url('https://i.imgur.com/8BgFfBc.png'); /* Replace with your background graphic */
      background-repeat: no-repeat;
      background-position: center;
    }

    /* Profile Picture */
    .profile-pic {
      width: 200px;
      height: 200px;
      border-radius: 50%;
      border: 8px solid white;
      margin-bottom: 20px;
      background-color: #FF9900;
    }

    /* Text Styling */
    h1 {
      font-size: 48px;
      color: #333;
    }

    h1 span {
      color: #FF9900;
    }

    p {
      font-size: 22px;
      margin-bottom: 20px;
    }

    /* About Me Button */
    .about-button {
      background-color: #007BFF;
      color: white;
      padding: 12px 25px;
      border-radius: 25px;
      text-decoration: none;
      font-size: 18px;
      transition: background-color 0.3s ease;
    }

    .about-button:hover {
      background-color: #0056b3;
    }

    /* Social Icons */
    .social-links {
      margin-top: 30px;
    }

    .social-links a {
      color: #333;
      font-size: 30px;
      margin: 0 15px;
      text-decoration: none;
      transition: color 0.3s ease;
    }

    .social-links a:hover {
      color: #FF9900;
    }

    /* Footer */
    footer {
      background-color: #222;
      color: white;
      padding: 10px;
      text-align: center;
      position: fixed;
      bottom: 0;
      width: 100%;
    }
  </style>
</head>
<body>

  <!-- Navigation -->
  <nav>
    <div class="logo">Shivanshi Tiwari</div>
    <ul>
      <li><a href="#home">Home</a></li>
      <li><a href="#about">About</a></li>
      <li><a href="#resume">Resume</a></li>
      <li><a href="#contact">Contact</a></li>
    </ul>
  </nav>

  <!-- Main Container -->
  <div id="home" class="container">
    <img class="profile-pic" src="https://github.com/shivanshitiwari/stiwari/raw/main/WhatsApp%20Image%202024-09-24%20at%2000.10.03.jpeg" alt="Shivanshi Tiwari">
    <h1>Hi There, I'm <span>Shivanshi Tiwari</span></h1>
    <p>I Am Into Business Analytics</p>
    <a href="#about" class="about-button">About Me</a>

    <!-- Social Media Links -->
    <div class="social-links">
      <a href="https://www.linkedin.com/in/st1405/" target="_blank"><i class="fab fa-linkedin"></i></a>
      <a href="https://github.com/shivanshitiwari" target="_blank"><i class="fab fa-github"></i></a>
      <a href="mailto:shivanshi9914@gmail.com"><i class="fas fa-envelope"></i></a>
    </div>
  </div>

  <!-- Footer -->
  <footer>
    &copy; 2024 Shivanshi Tiwari | Powered by GitHub Pages
  </footer>

</body>
</html>
